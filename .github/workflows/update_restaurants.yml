name: Update Restaurant Sheet

on:
  workflow_dispatch:
    inputs:
      sheet_name:
        description: "Name of the Google Sheet to update"
        required: false
        default: "Maine Restaurants & Bars"

jobs:
  update-sheet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          ENCODED_CREDENTIALS: ${{ secrets.ENCODED_CREDENTIALS }}
        run: |
          python3 app.py --sheet "${{ github.event.inputs.sheet_name || 'Maine Restaurants' }}"
